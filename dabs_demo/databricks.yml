bundle:
  name: DABDemo

include:
  - src/*.yml
  - src/env/*.yml
  - resources/jobs/*.yml
  - resources/pipelines/*.yml
  - resources/schemas/*.yml

permissions:
  - group_name: de_grp
    level: CAN_MANAGE
  - user_name: ${workspace.current_user.userName}
    level: CAN_MANAGE

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405618103198143.3.azuredatabricks.net/

  prod:
    default: false
    workspace:
      host: https://adb-7405618103198143.3.azuredatabricks.net/